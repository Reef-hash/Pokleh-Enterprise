<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Ice cube icon -->
  <g transform="translate(256,256)">
    <rect x="-80" y="-100" width="160" height="160" rx="20" fill="none" stroke="white" stroke-width="12" opacity="0.9"/>
    <path d="M-80,-40 L80,-40" stroke="white" stroke-width="6" opacity="0.4"/>
    <path d="M-80,20 L80,20" stroke="white" stroke-width="6" opacity="0.4"/>
    <path d="M-40,-100 L-40,60" stroke="white" stroke-width="6" opacity="0.3"/>
    <path d="M40,-100 L40,60" stroke="white" stroke-width="6" opacity="0.3"/>
  </g>
  <!-- Splash sparkle -->
  <circle cx="160" cy="140" r="8" fill="white" opacity="0.6"/>
  <circle cx="360" cy="180" r="5" fill="white" opacity="0.4"/>
  <circle cx="140" cy="320" r="6" fill="white" opacity="0.5"/>
</svg>
